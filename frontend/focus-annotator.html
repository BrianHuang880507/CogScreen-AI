<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>找不同座標標註工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="focus-annotator.css?v=20260318" />
  </head>
  <body>
    <main class="annotator-page">
      <header class="annotator-header">
        <h1>找不同座標標註工具</h1>
        <p>內部調校用途。點擊右半邊圖片建立差異區域座標。</p>
      </header>

      <section class="annotator-panel">
        <div class="annotator-controls">
          <label class="control-field">
            <span>圖片路徑</span>
            <input
              id="imagePathInput"
              type="text"
              value="/static/images/games/spot-the-diff/img_0001.jpg"
            />
          </label>
          <button id="loadImageButton" type="button">載入圖片</button>
          <label class="control-field mode-field">
            <span>形狀模式</span>
            <select id="shapeModeSelect">
              <option value="circle">circle</option>
              <option value="rect">rect</option>
            </select>
          </label>
          <label class="control-field radius-field">
            <span>圓半徑 (r)</span>
            <input id="circleRadiusInput" type="number" min="1" step="1" value="40" />
          </label>
          <button id="clearRegionsButton" type="button" class="danger">清空全部</button>
        </div>

        <div class="annotator-meta">
          <span>原圖尺寸：<strong id="naturalSizeText">--</strong></span>
          <span>最後點擊：<strong id="lastClickText">--</strong></span>
          <span>狀態：<strong id="annotatorStatusText">等待點擊</strong></span>
        </div>

        <div class="annotator-board" id="annotatorBoard">
          <img
            id="annotatorImage"
            class="annotator-image"
            src="/static/images/games/spot-the-diff/img_0001.jpg"
            alt="找不同合併圖"
          />
          <div class="annotator-overlay" id="annotatorOverlay" aria-hidden="true">
            <div class="annotator-split-guide"></div>
          </div>
        </div>
        <p class="board-hint">只接受右半邊點擊（x &gt;= 原圖寬度 / 2）。</p>
      </section>

      <section class="annotator-panel">
        <h2>已建立區域</h2>
        <div id="regionList" class="region-list"></div>
      </section>

      <section class="annotator-panel">
        <h2>匯出</h2>
        <div class="export-actions">
          <button id="exportButton" type="button">產生匯出文字</button>
          <button id="copyButton" type="button">複製到剪貼簿</button>
        </div>
        <textarea id="exportOutput" rows="12" readonly></textarea>
      </section>
    </main>

    <script src="focus-annotator.js?v=20260318"></script>
  </body>
</html>
