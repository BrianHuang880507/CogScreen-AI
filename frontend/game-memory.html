<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/static/images/ui/itri_CEL_A.jpg" />
    <title>失智症統計分析平台 - 記憶配對遊戲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260328" />
  </head>
  <body data-page="game-memory">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">失智統計分析平台</div>
            <div class="brand-sub">研究原型</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link" data-view="login" href="/">登入</a>
          <a class="nav-link nav-link-test" data-view="test" href="/test.html">測試</a>
        </nav>
        <div class="nav-bottom">
          <a class="nav-link" data-view="qa" href="/qa.html">Q&A</a>
        </div>
        <div class="side-footer">
          <p>研究/輔助篩檢用途，非診斷。</p>
        </div>
      </aside>

      <main class="content">
        <header class="page-header game-page-header">
          <div>
            <h1>記憶：圖片記憶配對</h1>
            <p class="muted">翻牌找出所有配對，觀察短期記憶與回想策略。</p>
          </div>
          <div class="session-pill">Session ID: <span id="gameSessionId">--</span></div>
        </header>

        <section class="panel game-summary-panel">
          <p id="gameStatus" class="muted game-status-line">請先選擇難度，再按下藍色三角形開始。</p>
          <div class="difficulty-picker" role="group" aria-label="難度">
            <button class="difficulty-button is-active" type="button" data-difficulty="easy">簡單</button>
            <button class="difficulty-button" type="button" data-difficulty="medium">中等</button>
            <button class="difficulty-button" type="button" data-difficulty="hard">困難</button>
          </div>
          <div class="game-summary-meta game-summary-meta-right">
            <a id="backToGames" class="ghost" href="/games.html">返回遊戲選單</a>
            <p class="game-progress">完成進度：<span id="gamesDone">0/4</span></p>
          </div>
        </section>

        <section class="panel game-panel memory-panel">
          <div class="game-panel-head">
            <h2>圖片記憶配對</h2>
          </div>
          <p id="memoryInstruction" class="memory-instruction">請找出所有相同圖片配對。</p>
          <div class="memory-meta">
            <div>配對：<span id="memoryMatched">0</span>/<span id="memoryPairsTotal">8</span></div>
            <div>翻牌：<span id="memoryMoves">0</span></div>
            <div>耗時：<span id="memoryTimer">0.0</span> 秒</div>
          </div>
          <div class="memory-board-wrap">
            <div id="memoryBoard" class="memory-board"></div>
            <div id="memoryStartOverlay" class="game-start-overlay is-inset">
              <button
                id="memoryStartButton"
                class="game-start-triangle"
                type="button"
                aria-label="開始遊戲"
              ></button>
            </div>
          </div>
          <p id="memoryResult" class="game-result">尚未開始。</p>
        </section>
      </main>
    </div>

    <button id="logoutBubble" class="logout-bubble hidden">登出</button>
    <div id="toast" class="toast"></div>
    <script src="app.js?v=20260327"></script>
    <script src="game-utils.js?v=20260327"></script>
    <script src="game-memory.js?v=20260328"></script>
  </body>
</html>
