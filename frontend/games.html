<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            rel="icon"
            type="image/jpeg"
            href="/static/images/ui/itri_CEL_A.jpg"
        />
        <title>失智症統計分析平台 - 遊戲選單</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css?v=20260327" />
    </head>
    <body data-page="games">
        <div class="app">
            <aside class="sidebar">
                <div class="brand">
                    <div class="brand-mark"></div>
                    <div class="brand-text">
                        <div class="brand-title">失智統計分析平台</div>
                        <div class="brand-sub">研究原型</div>
                    </div>
                </div>
                <nav class="nav">
                    <a class="nav-link" data-view="login" href="/">登入</a>
                    <a
                        class="nav-link nav-link-test"
                        data-view="test"
                        href="/test.html"
                        >測試</a
                    >
                </nav>
                <div class="nav-bottom">
                    <a class="nav-link" data-view="qa" href="/qa.html">Q&A</a>
                </div>
                <div class="side-footer">
                    <p>研究/輔助篩檢用途，非診斷。</p>
                </div>
            </aside>

            <main class="content">
                <header class="page-header game-page-header">
                    <div>
                        <h1>遊戲選單</h1>
                        <p class="muted">
                            請選擇卡片進入單一遊戲頁面。可直接開始遊戲，完成四類能力後可前往結果分析（邏輯類任一遊戲完成即可）。
                        </p>
                    </div>
                    <div class="session-pill">
                        Session ID: <span id="gameSessionId">--</span>
                    </div>
                </header>

                <section class="panel game-summary-panel">
                    <div class="game-summary-meta">
                        <p class="game-progress">
                            完成進度：<span id="gamesDone">0/4</span>
                        </p>
                        <p id="gameStatus" class="muted">點選卡片進入遊戲。</p>
                    </div>
                    <button
                        id="goResultsButton"
                        class="primary"
                        type="button"
                        disabled
                    >
                        前往結果分析
                    </button>
                </section>

                <div class="card-grid game-card-grid">
                    <button
                        class="test-card game-select-card"
                        data-game="logic"
                        type="button"
                    >
                        <div class="game-preview game-preview-logic">
                            <img
                                class="game-preview-bg"
                                src="/static/images/games/classify_thumbnail.png"
                            />
                        </div>
                        <div class="card-body">
                            <div class="game-card-head">
                                <h3>邏輯：物件分類</h3>
                                <span class="game-mode-tag">分類推理</span>
                            </div>
                            <p class="card-purpose">
                                拖曳物件到對應分類區，測量分類正確率與策略。
                            </p>
                            <p class="card-highlight">
                                形式：分級語意分類拖放。
                            </p>
                            <div class="game-card-foot">
                                <span class="game-meta-tag"
                                    >重點：策略與分類</span
                                >
                                <span
                                    class="game-state-chip"
                                    data-game-chip="logic"
                                    >未完成</span
                                >
                            </div>
                        </div>
                    </button>

                    <button
                        class="test-card game-select-card"
                        data-game="sequence"
                        type="button"
                    >
                        <div class="game-preview game-preview-sequence">
                            <img
                                class="game-preview-bg"
                                src="/static/images/games/數字順序點擊.png"
                                alt=""
                                aria-hidden="true"
                            />
                        </div>
                        <div class="card-body">
                            <div class="game-card-head">
                                <h3>邏輯：數字順序</h3>
                                <span class="game-mode-tag">順序推理</span>
                            </div>
                            <p class="card-purpose">
                                依照 1 到 9 的順序快速點擊，觀察規則執行與工作記憶。
                            </p>
                            <p class="card-highlight">形式：單頁順序點擊。</p>
                            <div class="game-card-foot">
                                <span class="game-meta-tag"
                                    >重點：順序與規劃</span
                                >
                                <span
                                    class="game-state-chip"
                                    data-game-chip="sequence"
                                    >未完成</span
                                >
                            </div>
                        </div>
                    </button>

                    <button
                        class="test-card game-select-card"
                        data-game="reaction"
                        type="button"
                    >
                        <div class="game-preview game-preview-reaction">
                            <img
                                class="game-preview-bg"
                                src="/static/images/games/whack-a-mole_thumbnail.png"
                            />
                        </div>
                        <div class="card-body">
                            <div class="game-card-head">
                                <h3>反應：打地鼠</h3>
                                <span class="game-mode-tag">即時反應</span>
                            </div>
                            <p class="card-purpose">
                                20 秒內盡量命中目標，觀察反應速度與失誤率。
                            </p>
                            <p class="card-highlight">形式：單頁節奏點擊。</p>
                            <div class="game-card-foot">
                                <span class="game-meta-tag"
                                    >重點：反應與抑制</span
                                >
                                <span
                                    class="game-state-chip"
                                    data-game-chip="reaction"
                                    >未完成</span
                                >
                            </div>
                        </div>
                    </button>

                    <button
                        class="test-card game-select-card"
                        data-game="memory"
                        type="button"
                    >
                        <div class="game-preview game-preview-memory">
                            <img
                                class="game-preview-bg"
                                src="/static/images/games/圖片配對.png"
                                alt=""
                                aria-hidden="true"
                            />
                        </div>
                        <div class="card-body">
                            <div class="game-card-head">
                                <h3>記憶：圖片配對</h3>
                                <span class="game-mode-tag">短期記憶</span>
                            </div>
                            <p class="card-purpose">
                                翻牌找出相同圖片配對，觀察短期記憶與回想策略。
                            </p>
                            <p class="card-highlight">形式：牌面記憶配對。</p>
                            <div class="game-card-foot">
                                <span class="game-meta-tag"
                                    >重點：記憶維持</span
                                >
                                <span
                                    class="game-state-chip"
                                    data-game-chip="memory"
                                    >未完成</span
                                >
                            </div>
                        </div>
                    </button>

                    <button
                        class="test-card game-select-card"
                        data-game="focus"
                        type="button"
                    >
                        <div class="game-preview game-preview-focus">
                            <img
                                class="game-preview-bg"
                                src="/static/images/games/spot-the-diff_thumbnail.png"
                                alt=""
                                aria-hidden="true"
                            />
                        </div>
                        <div class="card-body">
                            <div class="game-card-head">
                                <h3>專注：找不同</h3>
                                <span class="game-mode-tag">視覺搜尋</span>
                            </div>
                            <p class="card-purpose">
                                在目標圖中找出差異，觀察視覺專注與搜尋能力。
                            </p>
                            <p class="card-highlight">形式：單頁差異偵測。</p>
                            <div class="game-card-foot">
                                <span class="game-meta-tag"
                                    >重點：注意力維持</span
                                >
                                <span
                                    class="game-state-chip"
                                    data-game-chip="focus"
                                    >未完成</span
                                >
                            </div>
                        </div>
                    </button>
                </div>
            </main>
        </div>

        <button id="logoutBubble" class="logout-bubble hidden">登出</button>
        <div id="toast" class="toast"></div>
        <script src="app.js?v=20260327"></script>
        <script src="game-utils.js?v=20260327"></script>
        <script src="games.js?v=20260320b"></script>
    </body>
</html>
