<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>失智症統計分析平台 - 反應遊戲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260317" />
  </head>
  <body data-page="game-reaction">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div class="brand-text">
            <div class="brand-title">失智統計分析平台</div>
            <div class="brand-sub">研究原型</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link" data-view="login" href="/">登入</a>
          <a class="nav-link nav-link-test" data-view="test" href="/test.html">測試</a>
        </nav>
        <div class="nav-bottom">
          <a class="nav-link" data-view="qa" href="/qa.html">Q&A</a>
        </div>
        <div class="side-footer">
          <p>研究/輔助篩檢用途，非診斷。</p>
        </div>
      </aside>

      <main class="content">
        <header class="page-header game-page-header">
          <div>
            <h1>反應：打地鼠</h1>
            <p class="muted">20 秒內盡量命中目標，系統會計算命中與失誤。</p>
          </div>
          <div class="session-pill">Session ID: <span id="gameSessionId">--</span></div>
        </header>

        <section class="panel game-summary-panel">
          <div class="game-summary-meta">
            <p class="game-progress">完成進度：<span id="gamesDone">0/3</span></p>
            <p id="gameStatus" class="muted">按「開始 20 秒」後進行遊戲。</p>
          </div>
          <a id="backToGames" class="ghost" href="/games.html">返回遊戲選單</a>
        </section>

        <section class="panel game-panel">
          <div class="game-panel-head">
            <h2>點擊目標</h2>
            <button id="reactionStartButton" class="primary" type="button">開始 20 秒</button>
          </div>
          <div id="reactionDifficultyPicker" class="difficulty-picker" role="group" aria-label="難度">
            <button class="difficulty-button is-active" data-difficulty="easy" type="button">簡單</button>
            <button class="difficulty-button" data-difficulty="medium" type="button">中等</button>
            <button class="difficulty-button" data-difficulty="hard" type="button">困難</button>
            <span id="reactionSpeedHint" class="difficulty-hint">速度：慢</span>
          </div>
          <div class="whack-stats">
            <div>剩餘：<span id="reactionTimer">20.0</span> 秒</div>
            <div>命中：<span id="reactionHits">0</span></div>
            <div>失誤：<span id="reactionMisses">0</span></div>
          </div>
          <div id="reactionArena" class="whack-arena">
            <div id="reactionGrid" class="whack-grid"></div>
            <img id="reactionHammer" class="whack-hammer" src="/static/images/games/whack-a-mole/hammer.png" alt="" aria-hidden="true" />
          </div>
          <audio id="reactionSmashAudio" preload="auto" src="/static/audio/games/smash.mp3"></audio>
          <p id="reactionResult" class="game-result">尚未開始。</p>
        </section>
      </main>
    </div>

    <button id="logoutBubble" class="logout-bubble hidden">登出</button>
    <div id="toast" class="toast"></div>
    <script src="app.js?v=20260317"></script>
    <script src="game-utils.js?v=20260317"></script>
    <script src="game-reaction.js?v=20260317"></script>
  </body>
</html>
