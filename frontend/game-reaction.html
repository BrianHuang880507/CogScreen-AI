<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/static/images/ui/itri_CEL_A.jpg" />
    <title>失智統計分析平台 - 打地鼠</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260423" />
  </head>
  <body data-page="game-reaction">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">失智統計分析平台</div>
            <div class="brand-sub">遊戲訓練</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link" data-view="login" href="/">登入</a>
          <a class="nav-link nav-link-test" data-view="test" href="/test.html">測驗</a>
        </nav>
      </aside>

      <main class="content game-content">
        <header class="page-header game-page-header">
          <a id="backToGames" class="game-topbar-back" href="/games.html">返回選單</a>
          <h1>失智統計分析平台</h1>
          <div class="session-pill">Session ID: <span id="gameSessionId">--</span></div>
        </header>

        <p id="gameStatus" class="game-status-hidden">請按開始後打地鼠。</p>
        <p class="game-progress game-progress-hidden">完成進度：<span id="gamesDone">0/4</span></p>

        <section class="panel game-panel">
          <div class="game-hud">
            <div class="game-hud-item">命中：<span id="reactionHits">0</span></div>
          </div>
          <div id="reactionArena" class="whack-arena">
            <div id="reactionGrid" class="whack-grid"></div>
            <img id="reactionHammer" class="whack-hammer" src="/static/images/games/whack-a-mole/hammer_0001.png" alt="" aria-hidden="true" />
            <div id="reactionStartOverlay" class="game-start-overlay is-inset">
              <button id="reactionStartButton" class="game-start-triangle" type="button" aria-label="開始遊戲"></button>
            </div>
          </div>
          <audio id="reactionSmashAudio" preload="auto" src="/static/audio/games/smash.mp3"></audio>
          <p id="reactionResult" class="game-result game-result-hidden">按下開始後，先看洞口提示，再點出現的地鼠。</p>
        </section>
      </main>
    </div>

    <button id="logoutBubble" class="logout-bubble hidden">登出</button>
    <div id="toast" class="toast"></div>
    <script src="app.js?v=20260327"></script>
    <script src="game-utils.js?v=20260423"></script>
    <script src="game-reaction.js?v=20260423"></script>
  </body>
</html>
