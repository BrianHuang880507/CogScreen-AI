<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/static/images/ui/itri_CEL_A.jpg" />
    <title>失智統計分析平台 - 找不同</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260423" />
  </head>
  <body data-page="game-focus">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">失智統計分析平台</div>
            <div class="brand-sub">遊戲訓練</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link" data-view="login" href="/">登入</a>
          <a class="nav-link nav-link-test" data-view="test" href="/test.html">測驗</a>
        </nav>
      </aside>

      <main class="content game-content">
        <header class="page-header game-page-header">
          <a id="backToGames" class="game-topbar-back" href="/games.html">返回選單</a>
          <h1>失智統計分析平台</h1>
          <div class="session-pill">Session ID: <span id="gameSessionId">--</span></div>
        </header>

        <p id="gameStatus" class="game-status-hidden">請按開始後找不同。</p>
        <p class="game-progress game-progress-hidden">完成進度：<span id="gamesDone">0/4</span></p>

        <section class="panel game-panel">
          <div class="game-hud">
            <div id="focusHudFound" class="game-hud-item">已找到：0 / 0</div>
          </div>
          <div class="focus-board-wrap">
            <div class="focus-board" id="focusBoard">
              <img id="focusImage" class="focus-image" src="/static/images/games/spot-the-diff/img_0001.jpg" alt="找不同題目圖片" />
              <div id="focusMarkers" class="focus-markers" aria-hidden="true"></div>
              <div id="focusClickFlash" class="focus-click-flash" aria-hidden="true"></div>
              <div id="focusStartOverlay" class="game-start-overlay is-inset">
                <button id="focusStartButton" class="game-start-triangle" type="button" aria-label="開始遊戲"></button>
              </div>
            </div>
          </div>
          <p id="focusProgress" class="game-result game-result-hidden">已找到 0 / 0 個差異</p>
          <p id="focusResult" class="game-result game-result-hidden">按開始後，找出右半邊不同處。</p>
        </section>
      </main>
    </div>

    <button id="logoutBubble" class="logout-bubble hidden">登出</button>
    <div id="toast" class="toast"></div>
    <script src="app.js?v=20260327"></script>
    <script src="game-utils.js?v=20260423"></script>
    <script src="focus-levels.js?v=20260318"></script>
    <script src="game-focus.js?v=20260423"></script>
  </body>
</html>
