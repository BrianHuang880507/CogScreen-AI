<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>失智症統計分析平台 - 邏輯遊戲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260317" />
  </head>
  <body data-page="game-logic">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div class="brand-text">
            <div class="brand-title">失智統計分析平台</div>
            <div class="brand-sub">研究原型</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link" data-view="login" href="/">登入</a>
          <a class="nav-link nav-link-test" data-view="test" href="/test.html">測試</a>
        </nav>
        <div class="nav-bottom">
          <a class="nav-link" data-view="qa" href="/qa.html">Q&A</a>
        </div>
        <div class="side-footer">
          <p>研究/輔助篩檢用途，非診斷。</p>
        </div>
      </aside>

      <main class="content">
        <header class="page-header game-page-header">
          <div>
            <h1>邏輯：圖形分類</h1>
            <p class="muted">拖曳圖形到正確分類區，完成後自動計分。</p>
          </div>
          <div class="session-pill">Session ID: <span id="gameSessionId">--</span></div>
        </header>

        <section class="panel game-summary-panel">
          <div class="game-summary-meta">
            <p class="game-progress">完成進度：<span id="gamesDone">0/3</span></p>
            <p id="gameStatus" class="muted">請完成本遊戲。</p>
          </div>
          <a id="backToGames" class="ghost" href="/games.html">返回遊戲選單</a>
        </section>

        <section class="panel game-panel">
          <div class="game-panel-head">
            <h2>圖形拖曳區</h2>
            <button id="logicResetButton" class="ghost" type="button">重新開始</button>
          </div>
          <div id="logicTokenBank" class="shape-token-bank"></div>
          <div class="shape-bin-grid">
            <div class="shape-bin" data-accept="circle">
              <h3>圓形</h3>
            </div>
            <div class="shape-bin" data-accept="triangle">
              <h3>三角形</h3>
            </div>
            <div class="shape-bin" data-accept="square">
              <h3>方形</h3>
            </div>
          </div>
          <p id="logicResult" class="game-result">尚未完成。</p>
        </section>
      </main>
    </div>

    <button id="logoutBubble" class="logout-bubble hidden">登出</button>
    <div id="toast" class="toast"></div>
    <script src="app.js?v=20260317"></script>
    <script src="game-utils.js?v=20260317"></script>
    <script src="game-logic.js?v=20260317"></script>
  </body>
</html>
