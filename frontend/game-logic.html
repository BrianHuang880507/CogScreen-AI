<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/static/images/ui/itri_CEL_A.jpg" />
    <title>失智統計分析平台 - 物件分類</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260423" />
  </head>
  <body data-page="game-logic">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">失智統計分析平台</div>
            <div class="brand-sub">遊戲訓練</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link" data-view="login" href="/">登入</a>
          <a class="nav-link nav-link-test" data-view="test" href="/test.html">測驗</a>
        </nav>
      </aside>

      <main class="content game-content">
        <header class="page-header game-page-header">
          <a id="backToGames" class="game-topbar-back" href="/games.html">返回選單</a>
          <h1>失智統計分析平台</h1>
          <div class="session-pill">Session ID: <span id="gameSessionId">--</span></div>
        </header>

        <p id="gameStatus" class="game-status-hidden">請按開始後進行分類。</p>
        <p class="game-progress game-progress-hidden">完成進度：<span id="gamesDone">0/4</span></p>

        <section class="panel game-panel classification-game-panel">
          <div class="game-hud">
            <div id="logicProgressMeta" class="game-hud-item">完成：0 / 0</div>
          </div>
          <div class="logic-stage-title">
            <h2 id="classificationLevelTitle">物件分類</h2>
            <p id="classificationLevelDescription" class="muted">請把每張圖片放到正確分類。</p>
          </div>

          <div class="game-start-stage">
            <section class="classification-pool-panel" aria-labelledby="classificationPoolTitle">
              <h3 id="classificationPoolTitle">待分類圖片</h3>
              <div id="classificationItemPool" class="classification-item-pool"></div>
            </section>

            <div class="classification-zones-panel">
              <div id="classificationZoneGrid" class="classification-zone-grid"></div>
            </div>

            <div id="logicStartOverlay" class="game-start-overlay">
              <button id="logicStartButton" class="game-start-triangle" type="button" aria-label="開始遊戲"></button>
            </div>
          </div>

          <button id="logicResetButton" class="ghost logic-reset-floating" type="button">重新開始</button>
          <p id="logicFeedback" class="game-feedback game-result-hidden" aria-live="polite"></p>
          <p id="logicResult" class="game-result game-result-hidden">按開始後，可以拖曳圖片，也可以先點圖片再點分類。</p>
        </section>
      </main>
    </div>

    <button id="logoutBubble" class="logout-bubble hidden">登出</button>
    <div id="toast" class="toast"></div>
    <script src="app.js?v=20260327"></script>
    <script src="game-utils.js?v=20260423"></script>
    <script src="classification-levels.js?v=20260423"></script>
    <script src="game-logic.js?v=20260423"></script>
  </body>
</html>
